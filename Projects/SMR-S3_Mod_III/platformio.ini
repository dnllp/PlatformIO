; ============================================================
; platformio.ini — Configuración completa Framework SMR-S3
; Módulos 1 (PWM) + 2 (Encoders/PID) + 3 (Ultrasónico) + 4 (LiDAR/SLAM)
; Plataforma: ESP32-S3 DevKitC-1
; ============================================================
 
[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino
 
; ── Velocidad del monitor serial ─────────────────────────────
monitor_speed = 115200
 
; ── Rutas de código ──────────────────────────────────────────
;src_dir  = src
build_src_filter = +<*> -<.git/>
 
; ── PSRAM (obligatorio para el Módulo 4 — OccupancyMap) ──────
; El mapa de ocupación ocupa 360 KB, solo cabe en PSRAM
board_build.arduino.memory_type = qio_opi
 
; ── Flash: modo OPI para mayor velocidad ─────────────────────
board_build.flash_mode = qio

build_unflags = -std=gnu++11
; ── Flags de compilación ─────────────────────────────────────
build_flags =
    -I include
    -std=gnu++17
    -Wall
    -Wextra
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DARDUINO_SERIAL_EVENT_TASK_STACK_SIZE=4096
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
 
; ── Partición de flash ───────────────────────────────────────
board_build.partitions = default.csv
 
; ── Puerto de carga (ajustar según sistema operativo) ────────
; Windows : upload_port = COM3
; Linux   : upload_port = /dev/ttyUSB0
; macOS   : upload_port = /dev/cu.usbserial-XXXX
; upload_port = COM3
 
; ── Velocidad de carga ───────────────────────────────────────
upload_speed = 921600
 
; ── Monitor: filtros útiles para debug ───────────────────────
monitor_filters = esp32_exception_decoder, colorize