; ============================================================
; platformio.ini — Configuración PlatformIO para SMR-S3
; Framework SMR-S3 | Sistema Modular de Robótica Diferencial
; ============================================================

[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Velocidad del monitor serial ─────────────────────────────
monitor_speed = 115200

; ── Rutas de código fuente ───────────────────────────────────
build_src_filter = +<*> -<.git/>

; ── Directorio de headers ────────────────────────────────────
build_unflags = -std=gnu++11
build_flags =
    -I include
    -std=gnu++17
    -Wall
    -Wextra
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; ── Partición de flash (ajustar si se agregan módulos BLE/WiFi)
board_build.partitions = default.csv

; ── Puerto de comunicación (ajustar según sistema operativo)
; Windows : upload_port = COM8
; Linux   : upload_port = /dev/ttyUSB0
; macOS   : upload_port = /dev/cu.usbserial-XXXX
upload_port = COM8
